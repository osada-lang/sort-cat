<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sort Cat - 猫ソートパズル</title>
    <link rel="stylesheet" href="style.css?v=11.9">
</head>
<body>
    <!-- Start Screen Overlay -->
    <div id="start-screen">
        <div class="start-content">
            <span class="cat-icon-large">🐾</span>
            <h1 id="start-title">ねこぞろえ</h1>
            <p id="start-rules">同じ柄の猫をタワーに集めよう！<br>タップして猫を移動させます。</p>
            <div id="start-btn-container">
                <button id="start-continue-btn" class="hidden">つづきから</button>
                <button id="start-new-btn">さいしょから</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <header>
            <div id="title">ねこぞろえ</div>
            <div id="header-controls">
                <div id="level-info">Level <span id="level-number">1</span></div>
                <button id="mute-btn" class="icon-btn">🔊</button>
            </div>
        </header>

        <div id="tube-container">
            <!-- Towers will be generated by JS -->
        </div>

        <footer>
            <button id="reset-btn">やり直す</button>
            <button id="undo-btn">1つ戻す</button>
            <button id="add-tube-btn">+ タワー</button>
        </footer>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-overlay" class="hidden">
        <div class="victory-content">
            <h2>Level Clear! 🎉</h2>
            <p>次のレベルも頑張りましょう...</p>
        </div>
    </div>

    <!-- Tutorial Overlay -->
    <div id="tutorial-overlay" class="hidden">
        <div class="tutorial-content">
            <h2 id="tutorial-title">あそびかた</h2>
            <div id="tutorial-slides">
                <div class="tutorial-slide active" data-slide="0">
                    <p>同じ柄の猫を<br><strong>1つのタワーに4匹</strong>集めよう！</p>
                    <div class="tutorial-visual">
                        <span class="cat-emoji">🐱</span>
                        <span class="cat-emoji">🐱</span>
                        <span class="cat-emoji">🐱</span>
                        <span class="cat-emoji">🐱</span>
                    </div>
                </div>
                <div class="tutorial-slide" data-slide="1">
                    <p>タップして<strong>一番上の猫</strong>を選び、<br>別のタワーをタップして移動！</p>
                    <div class="tutorial-visual">
                        <span class="tap-icon">👆</span>
                    </div>
                </div>
                <div class="tutorial-slide" data-slide="2">
                    <p>移動できるのは：<br>・<strong>同じ柄の猫</strong>の上<br>・<strong>空のタワー</strong><br>だけだよ！</p>
                    <div class="tutorial-visual">
                        <span class="check-icon">✅</span>
                    </div>
                </div>
            </div>
            <div class="tutorial-footer">
                <div class="tutorial-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <button id="tutorial-next-btn">つぎへ</button>
            </div>
        </div>
    </div>

    <!-- Cat Walking Animation Overlay -->
    <div id="flying-cat-container"></div>

    <script src="game.js?v=9.0"></script>
</body>
</html>
